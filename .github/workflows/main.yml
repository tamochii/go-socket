# 工作流的名称
name: Build and Release Go App

# 当一个以 'v' 开头的标签被推送时触发
on:
  push:
    tags:
      - 'v*' # 例如 v1.0, v1.2.3

jobs:
  build-and-release:
    # 作业在最新的 Ubuntu 运行器上运行
    runs-on: ubuntu-latest
    steps:
      # 步骤 1: 检出你的仓库代码
      - uses: actions/checkout@v4

      # 步骤 2: 设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 你可以根据需要更改 Go 版本

      # 步骤 3: 编译 main.go，并将输出文件命名为 main 放在根目录
      - name: Build
        run: go build -v -o main main.go

      # 步骤 4: 创建 Release 并上传编译好的程序
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 要上传的文件路径
          files: main